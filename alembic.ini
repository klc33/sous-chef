# Alembic configuration for SousChef.
# The database URL is intentionally NOT set here — alembic/env.py injects it at runtime from
# app settings (which read the environment / Vault), so the same migrations run locally and on
# Railway without committing a connection string.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url =

# ── Logging ───────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
