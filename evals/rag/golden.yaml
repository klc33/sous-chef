# RAG golden set — labeled queries → the recipe(s) that SHOULD surface in the top-3 (hit@3 gate).
#
# Each case is one conversational search. `ideal` lists stable recipe identifiers (source + source_id)
# of recipes that genuinely match the query, any of which counts as a hit when it appears among the 3
# cards the cook actually sees. The gate metric is hit@3 = (cases with >=1 ideal in the surfaced 3) /
# (total cases) — measured on the 3 displayed cards (FR-006), reconciled with the over-fetch pool.
#
# Curation: ideals were chosen by TITLE/content match against the ACTUAL ingested corpus (not the
# embedding ranking, so the gate is not circular), and `category` is the category the matching recipes
# truly live in (the search pre-filters by category, so an ideal must share it). Grounding note: ideals
# are real corpus rows, never invented. Queries are constraint-free here (the wall is gated separately by
# test_wall_regression); these measure retrieval relevance only.

cases:
  - query: "something Thai for dinner"
    category: dinner
    ideal:
      - { source: themealdb, source_id: "53193" }   # Drunken noodles (pad kee mao)
      - { source: themealdb, source_id: "52774" }   # Pad See Ew
      - { source: themealdb, source_id: "53191" }   # Pad Thai
      - { source: themealdb, source_id: "52827" }   # Massaman Beef curry

