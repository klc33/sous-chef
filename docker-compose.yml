# Local development stack for SousChef: backend + datastores + the two UIs, brought up with one command.
# Backend starts only after Postgres, Redis, and Vault report healthy (depends_on), then runs the Alembic
# baseline, seeds dev Vault secrets, and launches uvicorn. The operator dashboard (Streamlit) and the cook
# widget (static React bundle) are sibling surfaces in their own lean images. See README Quickstart.

services:
  backend:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    # Migrate → seed Vault → serve. Seeding must precede uvicorn because app startup loads
    # secrets from Vault and fails fast if they are absent.
    command: >
      sh -c "alembic upgrade head &&
             sh scripts/seed_vault.sh &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: souschef
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Runs once on first init: creates the `phoenix` schema for Phoenix's trace store.
      - ./scripts/init_phoenix_schema.sql:/docker-entrypoint-initdb.d/init_phoenix_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d souschef"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:latest
    # Dev mode: auto-unsealed, in-memory, fixed root token. NEVER use -dev in production.
    command: server -dev
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Operator console (US3). Its own lean image (dashboard extra only — streamlit/authenticator/httpx/
  # pandas, no backend libs). Reads operator secrets from Vault over HTTP and drives the backend /admin/*
  # API with the Vault-issued admin token; never touches the DB directly. Depends on the backend because
  # the backend's start command is what seeds Vault (scripts/seed_vault.sh) with the operator secrets.
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    env_file:
      - .env          # BACKEND_ADMIN_URL, OPERATOR_USERNAME, VAULT_ADDR, VAULT_TOKEN (all non-secret)
    ports:
      - "8501:8501"
    depends_on:
      vault:
        condition: service_healthy
      backend:
        condition: service_started

  # Cook widget (US2): the React bundle built by Vite and served static by nginx. VITE_API_BASE is baked
  # at BUILD time (Vite inlines import.meta.env.*), so it is a build ARG — and it must be the
  # BROWSER-reachable backend origin (the published localhost:8000), not the compose-internal hostname,
  # because the SPA runs in the cook's browser. Published on 5173 to match the WIDGET_ORIGINS allow-list.
  widget:
    build:
      context: ./widget
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started

  # pgAdmin (US2, 005): a LOCAL-ONLY operator UI to inspect/repair the corpus, favorites, and seen-history.
  # Gated behind the `local` compose profile so a bare `docker compose up` omits it and it can never enter a
  # compose-based deploy; it is also structurally absent from railway.toml (backend-only). The mounted
  # servers.json pre-provisions the Postgres connection so the `souschef` server appears on first boot with
  # no manual setup. Credentials are local-only convenience env (.env), NOT Vault secrets. The wall stays
  # authoritative: the constraint guard runs at query time, so a manual pgAdmin edit cannot surface an
  # unsafe recipe on any cook-facing path (FR-018).
  pgadmin:
    image: dpage/pgadmin4
    profiles: ["local"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  phoenix:
    image: arizephoenix/phoenix:latest
    # Phoenix persists its trace store in the SAME Postgres instance (constitution P5/P10), but in
    # its OWN schema so its Alembic migrations don't collide with the app's alembic_version table
    # in `public`. The schema is auto-created by the postgres init script (scripts/init_phoenix_schema.sql).
    environment:
      PHOENIX_SQL_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/souschef
      PHOENIX_SQL_DATABASE_SCHEMA: phoenix
    ports:
      - "6006:6006"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
